version: 3

output:
    ver-nodejs/app/src/commonMain/kotlin/org/opengamestudio/kd.kt:
        type: jsexport

kotlin: package org.opengamestudio
kotlin: import kotlin.js.JsExport

AppContext:
    prefix-kotlin: @JsExport
    type: context
    fields:
        # Command line arguments
        arguments: [String]
        consoleOutput: String
        # Output path that is being saved at the moment
        currentOutputPathId: Int
        didLaunch: Bool
        # Entity comments with entities referenced by index
        entityComments: [Int: String]
        # Entity id -> Field name -> Field comment
        entityFieldComments: [Int: [String: String]]
        # Entity id -> Field name -> Field type
        entityFields: [Int: [String: String]]
        # Entity names in the order of appearance
        entityNames: [String]
        entityPrefixesKotlin: [Int: String]
        entityTypes: [Int: String]
        # Special F object for Kotlin
        fobjKotlin: String
        # Special F struct for Swift
        fobjSwift: String
        didWriteOutputFile: Bool
        inputFile: String
        inputFileDir: String
        inputFileLines: [String]
        isDbg: Bool
        # Output of type `c++hdr`
        outputCPPHeader: String
        # Output of type `c++sdk`
        outputCPPSDK: String
        # Output of type `c++src`
        outputCPPSource: String
        outputEntityContents: String
        outputFile: String
        # Contents to write to output file
        outputFileContents: String
        # Output of type `jsexport`
        outputJSExport: String
        # Output of type `kotlin`
        outputKotlin: String
        # Paths to save generated contents to
        outputPaths: [OutputPath]
        # Output of type `swift`
        outputSwift: String
        # Kotlin code to insert as is for `c++sdk` type
        rawCPPSDK: String
        # Kotlin code to insert as is at the beginning of the file
        rawKotlin: String
        # Swift code to insert as is at the beginning of the file
        rawSwift: String
        # Source code of src/*.kt
        srcKotlin: String
        # Source code of src/*.swift
        srcSwift: String

OutputPath:
    prefix-kotlin: @JsExport
    type: struct
    fields:
        path: String
        type: String
